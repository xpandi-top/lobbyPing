<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LobbyPing</title>
    <script>
      ;(() => {
        const base = '/lobbyPing'
        const path = window.location.pathname
        const route = path.startsWith(base) ? path.slice(base.length) || '/join' : '/join'
        const normalizedRoute = route === '/resident' ? '/home' : route
        window.location.replace(`${base}${normalizedRoute}${window.location.search}${window.location.hash}`)
      })()
    </script>
  </head>
  <body>
    <p>Opening LobbyPing...</p>
  </body>
</html>
