name: E2E & API Tests

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: Override base URL (default = production)
        required: false
        default: ''

permissions:
  contents: read
  checks: write

jobs:
  test:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ inputs.base_url || 'https://apps.xpandi.top' }}
      NOTIFY_URL: ${{ secrets.VITE_NOTIFY_URL }}
      ADMIN_KEY: ${{ secrets.VITE_ADMIN_KEY }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── API tests (no browser) ──────────────────────────────────────────
      - name: Run API tests
        run: npx vitest run tests/api/notify.test.ts
        env:
          NOTIFY_URL: ${{ secrets.VITE_NOTIFY_URL }}

      # ── E2E tests (Playwright) ──────────────────────────────────────────
      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test screenshots / traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
